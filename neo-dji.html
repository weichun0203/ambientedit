    <script>
        // ==========================================
        // 1. 資料庫定義
        // ==========================================
        const componentsData = {
            drone: { id: 'drone', name: '無人機', price: 6290, img: 'https://se-cdn.djiits.com/tpc/uploads/spu/cover/5ae0fa0ac5fa5f60b8173a69479fa922@small.png?format=webp' },
            battery: { id: 'battery', name: '電池*2', price: 2120, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/ea7a1fe3cc22bc14d90c25775f2f8399@large.jpg?format=webp' },
            charger: { id: 'charger', name: '充電管家', price: 850, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/06a6c6d84edcd47c8280ba610cb80653@large.jpg?format=webp' },
            transmission: { id: 'transmission', name: '圖傳', price: 510, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/0797afd9872e5ea45ac8b5bc68f38fad@large.jpg?format=webp' },
            rc: { id: 'rc', name: '遙控器', price: 3200, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/3cc7868bcc866c26010caf8405899648@large.jpg' },
            rc4550: { id: 'rc4550', name: 'FPV遙控器', price: 4550, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/3ac9a4a9af1d91af44762bbff448229d@large.jpg' },
            goggles: { id: 'goggles', name: '飛行眼鏡', price: 6990, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/4a0d9a8002ef02e9f1c70363d6674831@large.jpg' },
            motionRc: { id: 'motionRc', name: '手持遙控器', price: 2590, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/c3c3b778a2c7e25dd260c86ee5f4596b@large.jpg' },
            screenRc: { id: 'screenRc', name: '螢幕遙控器', price: 9890, img: 'https://se-cdn.djiits.com/tpc/uploads/photo/image/60ee2203629f90599b05986c5a2243e0@large.jpg' },
        };

        const packagesData = [
            { name: 'NEO2', sellPrice: 6290, origPrice: 6290, includes: ['drone'] },
            { name: 'NEO2 暢飛套裝(僅飛行器)', sellPrice: 8390, origPrice: 9260, includes: ['drone', 'battery', 'charger'] },
            { name: 'NEO2 暢飛套裝', sellPrice: 10490, origPrice: 12970, includes: ['drone', 'battery', 'charger', 'transmission', 'rc'] },
            { name: 'NEO2 體感暢飛套裝', sellPrice: 15590, origPrice: 19350, includes: ['drone', 'battery', 'charger', 'transmission', 'goggles', 'motionRc'] },
            { name: 'NEO2 暢飛套裝 + 飛行眼鏡', sellPrice: 17480, origPrice: 19960, includes: ['drone', 'battery', 'charger', 'transmission', 'rc', 'goggles'] },
            { name: 'NEO2 體感暢飛套裝+手持遙控器', sellPrice: 18790, origPrice: 22550, includes: ['drone', 'battery', 'charger', 'transmission', 'rc', 'goggles', 'motionRc'] },
            { name: 'NEO2+2電池+充電+雷達+眼鏡+遙控器', sellPrice: 19960, origPrice: 21310, includes: ['drone', 'battery', 'charger', 'transmission', 'rc4550', 'goggles'] },
            { name: 'NEO2 暢飛套裝 + 螢幕遙控器', sellPrice: 20380, origPrice: 22860, includes: ['drone', 'battery', 'charger', 'transmission', 'rc', 'screenRc'] }
        ];

        // ==========================================
        // 2. 狀態管理
        // ==========================================
        let currentMode = 'calc';
        let selectedItems = [];

        const formatMoney = (num) => num.toLocaleString('en-US');

        // ==========================================
        // 3. 視圖切換邏輯
        // ==========================================
        function setViewMode(mode) {
            currentMode = mode;
            
            // 更新按鈕樣式
            const buttons = ['calc', 'grid', 'table'];
            buttons.forEach(btn => {
                const el = document.getElementById(`btn-${btn}`);
                if (btn === mode) {
                    el.className = 'flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap bg-white text-brand-sage shadow-soft ring-1 ring-brand-sand';
                } else {
                    el.className = 'flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap text-brand-ink/60 hover:text-brand-ink hover:bg-white/50';
                }
            });

            renderView();
        }

        // ==========================================
        // 4. 渲染核心邏輯
        // ==========================================
        function renderView() {
            const container = document.getElementById('view-container');
            
            if (currentMode === 'calc') {
                container.innerHTML = getCalcViewHTML();
                renderCalcResult();
            } else if (currentMode === 'grid') {
                container.innerHTML = getGridViewHTML();
            } else if (currentMode === 'table') {
                container.innerHTML = getTableViewHTML();
                initDragToScroll('table-scroll-container'); // 初始化拖曳滑動
            }

            lucide.createIcons();
        }

        // 拖曳滑動共用功能
        function initDragToScroll(containerId) {
            const slider = document.getElementById(containerId);
            if (!slider) return;

            let isDown = false;
            let startX;
            let scrollLeft;

            slider.classList.add('cursor-grab');

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('cursor-grabbing');
                slider.classList.remove('cursor-grab');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });

            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.classList.remove('cursor-grabbing');
                slider.classList.add('cursor-grab');
            });

            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.classList.remove('cursor-grabbing');
                slider.classList.add('cursor-grab');
            });

            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2; // 調整這個數字改變拖曳速度
                slider.scrollLeft = scrollLeft - walk;
            });
        }

        // --- 智慧試算功能 ---
        window.toggleItem = function(id) {
            if (selectedItems.includes(id)) {
                selectedItems = selectedItems.filter(item => item !== id);
            } else {
                selectedItems.push(id);
            }
            renderView();
        };

        function getCalcViewHTML() {
            let itemsHTML = Object.values(componentsData).map(comp => {
                const isSelected = selectedItems.includes(comp.id);
                return `
                    <div onclick="window.toggleItem('${comp.id}')" 
                         class="relative cursor-pointer rounded-2xl border-2 p-4 md:p-5 transition-all duration-300 flex flex-col items-center gap-3 bg-white ${isSelected ? 'border-brand-sage shadow-soft bg-brand-sage/5' : 'border-brand-sand hover:border-brand-sage/50 hover:shadow-soft'}">
                        
                        <div class="absolute top-3 right-3 md:top-4 md:right-4 w-5 h-5 md:w-6 md:h-6 rounded-full flex items-center justify-center border-2 transition-colors ${isSelected ? 'bg-brand-sage border-brand-sage text-white' : 'border-brand-sand text-transparent'}">
                            <i data-lucide="check" class="w-3 h-3 md:w-3.5 md:h-3.5" stroke-width="3"></i>
                        </div>
                        
                        <div class="w-20 h-20 md:w-24 md:h-24 flex items-center justify-center p-1 md:p-2 mix-blend-multiply">
                            <img src="${comp.img}" alt="${comp.name}" class="max-w-full max-h-full object-contain transition-transform duration-500 ${isSelected ? 'scale-110 drop-shadow-sm' : ''}" />
                        </div>
                        <div class="text-center w-full mt-1 md:mt-2">
                            <div class="font-bold text-brand-ink text-xs md:text-base">${comp.name}</div>
                            <div class="text-brand-clay font-medium text-[10px] md:text-sm mt-0.5 md:mt-1">$${formatMoney(comp.price)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            // 新增 pb-24 以確保手機版滑到最底下時不會被懸浮條蓋住
            return `
                <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 pb-24 lg:pb-0 relative">
                    <!-- 左側：選擇區 -->
                    <div class="flex-1">
                        <div class="mb-6 flex items-baseline gap-3 border-b border-brand-sand pb-3">
                            <span class="bg-brand-clay text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold font-serif shrink-0">1</span>
                            <div>
                                <h2 class="text-base md:text-lg font-bold text-brand-ink font-serif">選擇所需擴充配件</h2>
                                <p class="text-brand-ink/60 text-[10px] md:text-xs mt-1">智慧系統將自動為您媒合最具性價比的購買組合</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-4 lg:gap-6">
                            ${itemsHTML}
                        </div>
                    </div>
                    
                    <!-- 右側：計算結果面板 -->
                    <div class="w-full lg:w-[400px] shrink-0">
                        <div class="sticky top-8">
                            <div class="mb-4 flex items-baseline gap-3">
                                <span class="bg-brand-sage text-white w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold font-serif shrink-0">2</span>
                                <h2 class="text-base md:text-lg font-bold text-brand-ink font-serif">最佳常溫購買提案</h2>
                            </div>
                            <div id="calc-result-container" class="bg-white rounded-3xl shadow-soft border border-brand-sand overflow-hidden relative scroll-mt-24">
                                <!-- 結果由 renderCalcResult 填入 -->
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderCalcResult() {
            const container = document.getElementById('calc-result-container');
            if (!container) return;

            if (selectedItems.length === 0) {
                container.innerHTML = `
                    <div class="p-12 md:p-16 text-center text-brand-ink/30 flex flex-col items-center">
                        <i data-lucide="inbox" class="w-12 h-12 md:w-16 md:h-16 mb-4 opacity-50 text-brand-sand"></i>
                        <p class="font-serif tracking-widest text-xs md:text-sm">尚無選擇項目</p>
                        <p class="text-[10px] md:text-xs mt-2 opacity-70">請於左方點擊您心儀的配件</p>
                    </div>
                `;
                return;
            }

            // 計算邏輯
            let minCost = Infinity;
            let bestOption = null;

            const aLaCarteCost = selectedItems.reduce((sum, id) => sum + componentsData[id].price, 0);
            minCost = aLaCarteCost;
            bestOption = { type: 'alacarte', totalCost: aLaCarteCost, saved: 0, missingItems: [...selectedItems], extraItems: [] };

            packagesData.forEach(pkg => {
                const missingItems = selectedItems.filter(id => !pkg.includes.includes(id));
                const extraItems = pkg.includes.filter(id => !selectedItems.includes(id));
                const missingCost = missingItems.reduce((sum, id) => sum + componentsData[id].price, 0);
                const totalCost = pkg.sellPrice + missingCost;

                if (totalCost < minCost) {
                    minCost = totalCost;
                    bestOption = {
                        type: 'package', pkg: pkg, totalCost: totalCost, saved: aLaCarteCost - totalCost, missingItems: missingItems, extraItems: extraItems
                    };
                }
            });

            // 產生優化後的結果 UI
            let html = `
                <div class="bg-brand-ink text-brand-paper p-6 md:p-8 text-center relative">
                    <!-- 裝飾底紋 -->
                    <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(circle at center, #8da399 1px, transparent 1px); background-size: 10px 10px;"></div>
                    
                    <div class="text-[10px] md:text-xs tracking-widest text-brand-paper/70 mb-2 font-serif uppercase">提案總預算</div>
                    <div class="text-3xl md:text-5xl font-black text-white">$${formatMoney(bestOption.totalCost)}</div>
                    ${bestOption.saved > 0 ? `
                        <div class="mt-3 md:mt-4 inline-flex items-center gap-1.5 bg-brand-clay text-white px-3 md:px-4 py-1 md:py-1.5 rounded-full text-[10px] md:text-xs font-bold tracking-widest shadow-sm">
                            <i data-lucide="tag" class="w-3 h-3 md:w-3.5 md:h-3.5"></i> 成功省下 $${formatMoney(bestOption.saved)}
                        </div>
                    ` : ''}
                </div>
                <div class="p-5 md:p-8 bg-white">
                    <h3 class="text-[10px] md:text-xs font-bold text-brand-sage uppercase tracking-widest mb-4 md:mb-5 border-b border-brand-sand pb-3 font-serif flex items-center gap-2">
                        <i data-lucide="receipt" class="w-3.5 h-3.5 md:w-4 md:h-4"></i> 採購清單明細
                    </h3>
            `;

            if (bestOption.type === 'alacarte') {
                html += `<div class="space-y-3 md:space-y-4">`;
                bestOption.missingItems.forEach(id => {
                    html += `
                        <div class="flex justify-between items-center group">
                            <span class="text-brand-ink text-xs md:text-sm flex items-center gap-2 font-medium">
                                <div class="w-1 h-1 md:w-1.5 md:h-1.5 rounded-full bg-brand-sand group-hover:bg-brand-clay transition-colors"></div>
                                ${componentsData[id].name} <span class="text-[10px] md:text-xs text-brand-ink/40 font-normal">單品</span>
                            </span>
                            <span class="font-bold text-brand-ink/90 text-sm md:text-base font-serif">$${formatMoney(componentsData[id].price)}</span>
                        </div>
                    `;
                });
                html += `</div>`;
            } else {
                html += `
                    <div class="space-y-4 md:space-y-5">
                        <div class="flex justify-between items-start gap-3 md:gap-4 p-3 md:p-4 bg-brand-paper rounded-xl border border-brand-sand/50">
                            <div>
                                <div class="font-bold text-brand-ink text-sm md:text-lg leading-tight mb-1.5 md:mb-2 font-serif">${bestOption.pkg.name}</div>
                                <div class="text-[9px] md:text-[10px] font-bold text-brand-sage border border-brand-sage/30 px-2 py-0.5 rounded-sm w-fit uppercase tracking-wider">優惠主套裝</div>
                            </div>
                            <span class="font-bold text-brand-ink shrink-0 font-serif text-sm md:text-base">$${formatMoney(bestOption.pkg.sellPrice)}</span>
                        </div>
                `;
                
                if (bestOption.missingItems.length > 0) {
                    html += `<div class="pt-1 md:pt-2 space-y-2 md:space-y-3">`;
                    bestOption.missingItems.forEach(id => {
                        html += `
                            <div class="flex justify-between items-center text-xs md:text-sm pl-3 md:pl-4 relative">
                                <!-- 連接線裝飾 -->
                                <div class="absolute left-1.5 top-1/2 -translate-y-1/2 w-[1px] h-full bg-brand-sand/50"></div>
                                <div class="absolute left-0 top-1/2 -translate-y-1/2 w-2 md:w-3 h-[1px] bg-brand-sand/50"></div>
                                
                                <span class="text-brand-ink flex items-center gap-1.5 md:gap-2 font-medium">
                                    <i data-lucide="plus" class="w-3 h-3 text-brand-clay"></i>
                                    ${componentsData[id].name} <span class="text-[9px] md:text-[10px] text-brand-ink/40 font-normal">加購單品</span>
                                </span>
                                <span class="font-bold text-brand-ink/80 text-xs md:text-sm font-serif">$${formatMoney(componentsData[id].price)}</span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
                html += `</div>`;
            }

            if (bestOption.extraItems && bestOption.extraItems.length > 0) {
                html += `
                    <div class="mt-6 md:mt-8 bg-brand-sage/10 rounded-xl p-4 md:p-5 border border-brand-sage/20 relative overflow-hidden">
                        <!-- 裝飾光暈 -->
                        <div class="absolute -right-6 -top-6 w-16 h-16 md:w-20 md:h-20 bg-brand-sage/20 rounded-full blur-xl pointer-events-none"></div>
                        
                        <h4 class="text-brand-sage text-[10px] md:text-xs font-bold mb-2 md:mb-3 flex items-center gap-1.5 md:gap-2 font-serif tracking-widest">
                            <i data-lucide="gift" class="w-3.5 h-3.5 md:w-4 md:h-4 text-brand-clay"></i> 組合溢出價值
                        </h4>
                        <ul class="text-xs md:text-sm text-brand-ink/80 space-y-1.5 md:space-y-2 relative z-10">
                `;
                bestOption.extraItems.forEach(id => {
                    html += `
                        <li class="flex items-center justify-between group">
                            <div class="flex items-center gap-1.5 md:gap-2">
                                <i data-lucide="check-circle-2" class="w-3 h-3 md:w-3.5 md:h-3.5 text-brand-sage"></i> 
                                <span>${componentsData[id].name}</span>
                            </div>
                            <span class="text-[9px] md:text-[10px] bg-white px-1.5 py-0.5 rounded text-brand-ink/50 shadow-sm font-serif">賺到 $${formatMoney(componentsData[id].price)}</span>
                        </li>
                    `;
                });
                html += `</ul></div>`;
            }

            html += `</div>`;

            // 追加手機版專用「懸浮結帳條」，點擊跳躍至結果面板
            html += `
                <!-- 手機版懸浮結帳條 -->
                <div class="fixed bottom-4 left-4 right-4 bg-brand-ink/95 backdrop-blur-md text-white p-4 rounded-2xl shadow-2xl z-50 flex justify-between items-center lg:hidden cursor-pointer border border-white/10" 
                     onclick="document.getElementById('calc-result-container').scrollIntoView({ behavior: 'smooth', block: 'center' })">
                    <div class="flex flex-col">
                        <span class="text-[10px] text-brand-paper/70 font-serif tracking-widest uppercase mb-0.5">總計預算</span>
                        <span class="font-black text-xl leading-none">$${formatMoney(bestOption.totalCost)}</span>
                    </div>
                    <div class="flex items-center gap-2 bg-brand-sage hover:bg-brand-sage/90 text-white px-4 py-2 rounded-full text-xs font-bold tracking-widest shadow-sm transition-colors">
                        查看明細 <i data-lucide="arrow-down" class="w-4 h-4"></i>
                    </div>
                </div>
            `;

            container.innerHTML = html;
        }

        // --- 卡片視圖 ---
        function getGridViewHTML() {
            // 優化網格在手機版的一欄呈現，並調整整體卡片的 Padding 和字體大小以貼合手機閱讀
            let html = '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6 lg:gap-8">';
            
            packagesData.forEach(pkg => {
                const savedAmount = pkg.origPrice - pkg.sellPrice;
                const hasDiscount = savedAmount > 0;
                
                let includesHTML = '';
                Object.values(componentsData).forEach(comp => {
                    if (pkg.includes.includes(comp.id)) {
                        includesHTML += `
                            <div class="flex items-center gap-3 md:gap-4 py-1">
                                <div class="w-12 h-12 md:w-16 md:h-16 rounded-lg md:rounded-xl bg-brand-paper border border-brand-sand flex items-center justify-center p-1.5 md:p-2 mix-blend-multiply shrink-0">
                                    <img src="${comp.img}" alt="${comp.name}" class="w-full h-full object-contain" />
                                </div>
                                <div class="flex-1">
                                    <div class="text-xs md:text-sm font-bold text-brand-ink">${comp.name}</div>
                                    <div class="text-[10px] md:text-xs text-brand-ink/50 font-serif">$${formatMoney(comp.price)}</div>
                                </div>
                            </div>
                        `;
                    }
                });

                html += `
                    <div class="bg-white rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-sm border border-brand-sand hover:shadow-soft hover:border-brand-sage/50 transition-all flex flex-col h-full relative group">
                        ${hasDiscount ? `
                            <div class="absolute -top-3 -right-3 bg-brand-clay text-white text-[10px] md:text-xs font-bold px-3 py-1.5 md:px-4 md:py-2 rounded-xl shadow-sm z-10 flex items-center gap-1 md:gap-1.5 font-serif tracking-wider transform group-hover:scale-105 transition-transform">
                                <i data-lucide="tag" class="w-3 h-3 md:w-3.5 md:h-3.5"></i> 省 $${formatMoney(savedAmount)}
                            </div>
                        ` : ''}
                        
                        <div class="mb-4 md:mb-6 flex-grow-0 border-b border-brand-sand pb-4 md:pb-6">
                            <h2 class="text-base md:text-xl font-bold text-brand-ink leading-tight mb-2 md:mb-4 min-h-[2.5rem] md:min-h-[3.5rem] font-serif">${pkg.name}</h2>
                            <div class="flex flex-col gap-0.5 md:gap-1">
                                <span class="text-[9px] md:text-[10px] text-brand-sage font-bold tracking-widest uppercase mb-0.5 md:mb-1">組合優惠價</span>
                                <div class="text-2xl md:text-4xl font-black text-brand-ink font-serif">$${formatMoney(pkg.sellPrice)}</div>
                                <div class="text-[10px] md:text-xs text-brand-ink/40 mt-1 font-sans ${hasDiscount ? 'line-through' : ''}">拆買總和: $${formatMoney(pkg.origPrice)}</div>
                            </div>
                        </div>

                        <div class="flex-grow flex flex-col">
                            <h3 class="text-[9px] md:text-[10px] font-bold text-brand-ink/40 uppercase tracking-widest mb-3 md:mb-4 flex items-center gap-2">
                                <span class="w-4 h-[1px] bg-brand-sand"></span> 內容物明細
                            </h3>
                            <div class="flex flex-col gap-1.5 md:gap-2">
                                ${includesHTML}
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }

        // --- 表格視圖 ---
        function getTableViewHTML() {
            // 電腦版保留 sticky 凍結，手機版取消凍結自由滑動
            const compKeys = Object.keys(componentsData);
            
            let theadHtml = `
                <tr>
                    <th class="p-4 md:p-5 border-b border-brand-sand bg-brand-paper font-bold text-brand-ink min-w-[150px] lg:min-w-[210px] lg:max-w-[210px] lg:sticky lg:left-0 z-20 font-serif tracking-wide whitespace-nowrap">套裝提案</th>
                    <th class="p-4 md:p-5 border-b border-brand-sand bg-brand-paper text-center font-bold text-brand-ink min-w-[110px] lg:min-w-[130px] lg:max-w-[130px] lg:sticky lg:left-[210px] z-20 font-serif tracking-wide whitespace-nowrap">專屬總價</th>
                    <th class="p-4 md:p-5 border-b border-brand-sand bg-brand-paper text-center font-bold text-brand-ink min-w-[100px] lg:min-w-[110px] lg:max-w-[110px] lg:sticky lg:left-[340px] z-20 font-serif tracking-wide border-r border-brand-sand whitespace-nowrap lg:shadow-[4px_0_12px_-4px_rgba(0,0,0,0.05)]">節省差額</th>
            `;
            
            compKeys.forEach(key => {
                theadHtml += `
                    <th class="p-4 border-b border-brand-sand bg-white text-center min-w-[100px] md:min-w-[120px]">
                        <div class="flex flex-col items-center gap-2 md:gap-3 pointer-events-none">
                            <div class="w-12 h-12 md:w-16 md:h-16 bg-brand-paper rounded-lg md:rounded-xl border border-brand-sand/50 p-1.5 md:p-2 mix-blend-multiply">
                               <img src="${componentsData[key].img}" alt="${componentsData[key].name}" class="w-full h-full object-contain" draggable="false" />
                            </div>
                            <div class="flex flex-col">
                                <span class="font-bold text-brand-ink text-[10px] md:text-xs">${componentsData[key].name}</span>
                                <span class="text-brand-clay text-[9px] md:text-[10px] mt-0.5 font-serif">$${formatMoney(componentsData[key].price)}</span>
                            </div>
                        </div>
                    </th>
                `;
            });
            theadHtml += `</tr>`;

            let tbodyHtml = '';
            packagesData.forEach(pkg => {
                const savedAmount = pkg.origPrice - pkg.sellPrice;
                
                tbodyHtml += `<tr class="hover:bg-[#f4f6f5] transition-colors group border-b border-brand-sand/30 last:border-0">`;
                
                tbodyHtml += `<td class="p-4 md:p-5 font-bold text-brand-ink bg-white group-hover:bg-[#f4f6f5] transition-colors min-w-[150px] lg:min-w-[210px] lg:max-w-[210px] lg:sticky lg:left-0 z-10 font-serif leading-snug">${pkg.name}</td>`;
                tbodyHtml += `<td class="p-4 md:p-5 text-center pointer-events-none bg-white group-hover:bg-[#f4f6f5] transition-colors min-w-[110px] lg:min-w-[130px] lg:max-w-[130px] lg:sticky lg:left-[210px] z-10"><span class="font-black text-brand-ink text-lg md:text-xl font-serif">$${formatMoney(pkg.sellPrice)}</span></td>`;
                
                tbodyHtml += `
                    <td class="p-4 md:p-5 text-center border-r border-brand-sand bg-brand-paper group-hover:bg-[#f0f2ed] transition-colors pointer-events-none min-w-[100px] lg:min-w-[110px] lg:max-w-[110px] lg:sticky lg:left-[340px] z-10 lg:shadow-[4px_0_12px_-4px_rgba(0,0,0,0.05)]">
                        <div class="flex flex-col items-center justify-center h-full">
                            <span class="text-[10px] text-brand-ink/40 line-through font-serif">$${formatMoney(pkg.origPrice)}</span>
                            ${savedAmount > 0 
                                ? `<span class="text-[10px] md:text-xs font-bold text-brand-clay bg-brand-clay/10 px-2 py-0.5 md:py-1 rounded-sm mt-1 tracking-wider whitespace-nowrap">省 $${formatMoney(savedAmount)}</span>`
                                : `<span class="text-xs text-brand-ink/20 mt-1">-</span>`
                            }
                        </div>
                    </td>
                `;

                compKeys.forEach(key => {
                    const isIncluded = pkg.includes.includes(key);
                    tbodyHtml += `
                        <td class="p-4 md:p-5 text-center pointer-events-none">
                            <div class="flex justify-center">
                                ${isIncluded 
                                    ? `<div class="w-5 h-5 md:w-6 md:h-6 rounded-full bg-brand-sage text-white flex items-center justify-center shadow-sm"><i data-lucide="check" class="w-3 h-3 md:w-3.5 md:h-3.5" stroke-width="3"></i></div>`
                                    : `<span class="w-1.5 h-[1.5px] md:w-2 md:h-[2px] bg-brand-sand rounded-full"></span>`
                                }
                            </div>
                        </td>
                    `;
                });
                tbodyHtml += `</tr>`;
            });

            return `
                <div class="bg-white rounded-2xl md:rounded-3xl shadow-soft border border-brand-sand overflow-hidden">
                    <div id="table-scroll-container" class="overflow-x-auto no-scrollbar select-none">
                        <table class="w-full text-left border-collapse min-w-full">
                            <thead>${theadHtml}</thead>
                            <tbody>${tbodyHtml}</tbody>
                        </table>
                    </div>
                </div>
                <div class="text-center mt-3 md:mt-4 text-[10px] md:text-xs text-brand-ink/40 flex items-center justify-center gap-1">
                    <i data-lucide="mouse-pointer-2" class="w-3 h-3"></i> 提示：可直接拖曳或滑動表格查看完整配件
                </div>
            `;
        }

        // 初始渲染
        renderView();

    </script>
</body>
</html>
