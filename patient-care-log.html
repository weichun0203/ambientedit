<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="常溫編集所病人照護日誌，提供生理數值、飲食與行為紀錄功能。">
    <title>常溫病人照護日誌｜Ambient Patient Care Log</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            paper: '#fdfbf7',
                            ink: '#4a4a4a',
                            sage: '#8da399',
                            sageDark: '#768a81',
                            clay: '#d4a59a',
                            sand: '#e6e2dd',
                        }
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Noto Serif TC"', 'serif']
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- React & Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #fdfbf7; 
            color: #4a4a4a;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        }
        .input-label { display: block; font-weight: 500; color: #768a81; margin-bottom: 0.4rem; font-size: 0.9rem; }
        .input-field { 
            width: 100%; padding: 0.75rem; background-color: #fff; border-radius: 0.75rem; 
            border: 1px solid #e6e2dd; outline: none; transition: all 0.3s ease; 
        }
        .input-field:focus { border-color: #8da399; box-shadow: 0 0 0 3px rgba(141, 163, 153, 0.1); }
        .btn-primary { 
            background-color: #8da399; color: white; padding: 0.8rem; border-radius: 2rem; 
            width: 100%; font-weight: 500; transition: all 0.3s ease; 
        }
        .btn-primary:hover { background-color: #768a81; transform: translateY(-1px); }
        .card { background: white; border-radius: 1.25rem; border: 1px solid #f3f0eb; overflow: hidden; margin-bottom: 1.5rem; }
        .badge-tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 500; margin-right: 8px; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .spinner { border: 2px solid #f3f3f3; border-top: 2px solid #8da399; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- 設定與模擬數據 ---
        const PLACEHOLDER_URL = "請輸入你的GAS內容";
        const STORAGE_KEY_HISTORY = 'patient_tracker_history_v1';

        // 虛擬歷史數據
        const MOCK_DATA = [
            {
                uuid: "mock-1",
                date: "2024/03/20",
                time: "08:30",
                bpSystolic: "118",
                bpDiastolic: "76",
                bloodSugar: "95",
                heartRate: "72",
                medication: "降血壓藥 1 顆",
                diet: "[正常] 清淡稀飯配肉鬆",
                bowel: "[正常] 成形，金黃色",
                behavior: "[平穩] 精神不錯，有在客廳散步"
            },
            {
                uuid: "mock-2",
                date: "2024/03/19",
                time: "20:15",
                bpSystolic: "125",
                bpDiastolic: "82",
                bloodSugar: "140",
                heartRate: "78",
                medication: "晚間維他命",
                diet: "[佳] 燉煮蔬菜與半碗飯",
                bowel: "",
                behavior: "[疲倦] 稍微嗜睡，早早就休息了"
            }
        ];

        const OPTIONS = {
            bowel: ['正常', '便秘', '腹瀉', '失禁', '其他'],
            appetite: ['正常', '佳', '差', '其他'],
            mood: ['平穩', '開心', '焦慮', '生氣', '憂鬱', '躁動', '其他']
        };

        const App = () => {
            const [view, setView] = useState('record'); 
            const [gasUrl, setGasUrl] = useState(localStorage.getItem('patient_tracker_url') || PLACEHOLDER_URL);
            const [loading, setLoading] = useState(false);
            const [message, setMessage] = useState(null);
            const [historyData, setHistoryData] = useState([]);
            
            const [isEditing, setIsEditing] = useState(false);
            const [editingUuid, setEditingUuid] = useState(null);

            const initialFormState = {
                bpSystolic: '', bpDiastolic: '', bloodSugar: '', heartRate: '',
                medication: '', bowelStatus: '', bowelNotes: '',
                appetite: '', dietContent: '', mood: '', behaviorNotes: ''
            };
            const [formData, setFormData] = useState(initialFormState);

            useEffect(() => {
                lucide.createIcons();
            }, [view, historyData]);

            const showMessage = (type, text) => {
                setMessage({ type, text });
                setTimeout(() => setMessage(null), 3000);
            };

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const fetchHistory = async () => {
                if (!gasUrl || gasUrl === PLACEHOLDER_URL) {
                    setHistoryData(MOCK_DATA);
                    return;
                }

                setLoading(true);
                try {
                    const response = await fetch(gasUrl);
                    const result = await response.json();
                    const freshData = result.data || [];
                    setHistoryData(freshData);
                    localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(freshData));
                } catch (error) {
                    console.error('Fetch Error:', error);
                    const cached = localStorage.getItem(STORAGE_KEY_HISTORY);
                    setHistoryData(cached ? JSON.parse(cached) : MOCK_DATA);
                    showMessage('error', '無法連線雲端，已顯示離線/虛擬數據');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (view === 'history') fetchHistory();
            }, [view]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (gasUrl === PLACEHOLDER_URL) {
                    showMessage('error', '請先至設定頁面貼上你的 GAS URL 才能同步到雲端');
                    return;
                }

                setLoading(true);
                try {
                    const payload = {
                        action: isEditing ? 'update' : 'create',
                        uuid: editingUuid || crypto.randomUUID(),
                        ...formData,
                        bowel: `[${formData.bowelStatus}] ${formData.bowelNotes}`.trim(),
                        diet: `[${formData.appetite}] ${formData.dietContent}`.trim(),
                        behavior: `[${formData.mood}] ${formData.behaviorNotes}`.trim()
                    };

                    await fetch(gasUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'text/plain' },
                        body: JSON.stringify(payload)
                    });

                    showMessage('success', '紀錄已處理');
                    setFormData(initialFormState);
                    setIsEditing(false);
                    if (isEditing) setView('history');
                } catch (error) {
                    showMessage('error', '儲存失敗');
                } finally {
                    setLoading(false);
                }
            };

            const groupedHistory = useMemo(() => {
                const groups = {};
                historyData.forEach(item => {
                    if (!groups[item.date]) groups[item.date] = [];
                    groups[item.date].push(item);
                });
                return Object.keys(groups).map(date => ({ date, items: groups[date] }));
            }, [historyData]);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24 px-4 pt-8">
                    {/* Header */}
                    <header className="mb-8 border-b border-brand-sand pb-6">
                        <div className="flex justify-between items-center">
                            <div>
                                <h2 className="text-xs font-medium tracking-widest text-brand-sage uppercase mb-1">Ambient Edit Studio</h2>
                                <h1 className="text-2xl font-bold text-brand-ink leading-tight">{isEditing ? '修改紀錄' : '病人照護日誌'}</h1>
                            </div>
                            
                            <div className="flex items-center gap-2">
                                {/* 常溫首頁按鈕 - 放在左側 */}
                                <a href="https://weichun0203.github.io/ambientedit/" 
                                   className="group inline-flex items-center px-3 py-2 rounded-full border border-brand-sand hover:border-brand-sage hover:bg-white transition-all duration-300 shadow-sm bg-white/50 backdrop-blur-sm no-underline"
                                   aria-label="返回常溫首頁">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4 text-brand-sage group-hover:text-brand-ink transition-colors duration-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                                        <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                                        <polyline points="9 22 9 12 15 12 15 22"/>
                                    </svg>
                                    <span className="ml-1.5 text-[10px] font-bold tracking-wider text-brand-sage group-hover:text-brand-ink transition-colors duration-300">
                                        常溫首頁
                                    </span>
                                </a>

                                {/* 設定按鈕 */}
                                <button onClick={() => setView('settings')} className="p-2 text-gray-400 hover:text-brand-sage transition-colors bg-white rounded-full shadow-sm border border-brand-sand/50">
                                    <i data-lucide="settings" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Notification */}
                    {message && (
                        <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full text-sm shadow-lg animate-fade-in ${message.type === 'error' ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-700'}`}>
                            {message.text}
                        </div>
                    )}

                    {/* Views */}
                    {view === 'settings' && (
                        <div className="card p-6 animate-fade-in">
                            <h3 className="font-bold mb-4 flex items-center gap-2"><i data-lucide="database" className="w-4 h-4"></i> 雲端同步設定</h3>
                            <p className="text-xs text-gray-500 mb-4 leading-relaxed">請貼上部署好的 Google Apps Script 網址。若留空或使用預設值，系統將運作為「展示模式」。</p>
                            <input 
                                type="text" 
                                value={gasUrl} 
                                onChange={(e) => {setGasUrl(e.target.value); localStorage.setItem('patient_tracker_url', e.target.value);}} 
                                className="input-field mb-6 text-xs font-mono" 
                                placeholder="https://script.google.com/macros/s/.../exec"
                            />
                            <button onClick={() => setView('record')} className="btn-primary">返回紀錄</button>
                        </div>
                    )}

                    {view === 'record' && (
                        <form onSubmit={handleSubmit} className="space-y-6 animate-fade-in">
                            {/* 生理數據 */}
                            <div className="card p-6">
                                <h3 className="font-bold text-brand-sage mb-4 flex items-center gap-2"><i data-lucide="heart-pulse" className="w-5 h-5"></i> 生理數值</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    <div><label className="input-label">血壓 (收縮/舒張)</label>
                                        <div className="flex gap-1 items-center">
                                            <input type="number" name="bpSystolic" value={formData.bpSystolic} onChange={handleChange} className="input-field text-center" placeholder="120" />
                                            <span>/</span>
                                            <input type="number" name="bpDiastolic" value={formData.bpDiastolic} onChange={handleChange} className="input-field text-center" placeholder="80" />
                                        </div>
                                    </div>
                                    <div><label className="input-label">血糖 (mg/dL)</label>
                                        <input type="number" name="bloodSugar" value={formData.bloodSugar} onChange={handleChange} className="input-field" placeholder="100" />
                                    </div>
                                </div>
                            </div>

                            {/* 護理內容 */}
                            <div className="card p-6 space-y-4">
                                <h3 className="font-bold text-brand-sage mb-2 flex items-center gap-2"><i data-lucide="clipboard-list" className="w-5 h-5"></i> 照護紀錄</h3>
                                <div>
                                    <label className="input-label">排便狀況</label>
                                    <div className="flex gap-2">
                                        <select name="bowelStatus" value={formData.bowelStatus} onChange={handleChange} className="input-field w-1/3">
                                            <option value="">選擇</option>
                                            {OPTIONS.bowel.map(o => <option key={o} value={o}>{o}</option>)}
                                        </select>
                                        <input type="text" name="bowelNotes" value={formData.bowelNotes} onChange={handleChange} className="input-field flex-1" placeholder="顏色、形狀備註..." />
                                    </div>
                                </div>
                                <div>
                                    <label className="input-label">飲食紀錄</label>
                                    <div className="flex gap-2">
                                        <select name="appetite" value={formData.appetite} onChange={handleChange} className="input-field w-1/3">
                                            <option value="">食慾</option>
                                            {OPTIONS.appetite.map(o => <option key={o} value={o}>{o}</option>)}
                                        </select>
                                        <input type="text" name="dietContent" value={formData.dietContent} onChange={handleChange} className="input-field flex-1" placeholder="內容物..." />
                                    </div>
                                </div>
                                <div>
                                    <label className="input-label">服藥與備註</label>
                                    <textarea name="medication" value={formData.medication} onChange={handleChange} className="input-field h-20 resize-none" placeholder="藥品名稱、時間或其他異常發現..."></textarea>
                                </div>
                            </div>

                            <button type="submit" disabled={loading} className="btn-primary flex justify-center items-center gap-2">
                                {loading && <div className="spinner"></div>}
                                {isEditing ? '更新這筆紀錄' : '確認送出紀錄'}
                            </button>
                        </form>
                    )}

                    {view === 'history' && (
                        <div className="space-y-6 animate-fade-in">
                            {gasUrl === PLACEHOLDER_URL && (
                                <div className="bg-orange-50 border border-orange-100 p-3 rounded-xl text-xs text-orange-600 flex gap-2">
                                    <i data-lucide="info" className="w-4 h-4 shrink-0"></i>
                                    目前為「展示模式」，顯示的是範例虛擬數據。
                                </div>
                            )}
                            
                            {groupedHistory.map(group => (
                                <div key={group.date}>
                                    <div className="flex items-center mb-4">
                                        <div className="h-px bg-brand-sand flex-1"></div>
                                        <span className="px-4 text-sm font-serif font-bold text-brand-sage">{group.date}</span>
                                        <div className="h-px bg-brand-sand flex-1"></div>
                                    </div>
                                    <div className="space-y-4">
                                        {group.items.map(item => (
                                            <div key={item.uuid} className="card p-4 text-sm">
                                                <div className="flex justify-between mb-3 items-center">
                                                    <span className="bg-brand-paper px-2 py-1 rounded text-xs font-mono text-brand-sageDark">{item.time}</span>
                                                    <div className="flex gap-3 text-brand-sage text-xs">
                                                        {item.bpSystolic && <span>血壓: {item.bpSystolic}/{item.bpDiastolic}</span>}
                                                        {item.bloodSugar && <span>血糖: {item.bloodSugar}</span>}
                                                    </div>
                                                </div>
                                                <div className="space-y-2 text-brand-ink">
                                                    {item.bowel && <p className="flex gap-2"><span className="text-purple-400 font-bold">排便</span>{item.bowel}</p>}
                                                    {item.diet && <p className="flex gap-2"><span className="text-orange-400 font-bold">飲食</span>{item.diet}</p>}
                                                    {item.behavior && <p className="flex gap-2"><span className="text-blue-400 font-bold">表現</span>{item.behavior}</p>}
                                                    {item.medication && <p className="bg-gray-50 p-2 rounded text-xs text-gray-500 italic">{item.medication}</p>}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* Bottom Nav */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/80 backdrop-blur-md shadow-lg rounded-full p-1 flex gap-1 z-40 border border-brand-sand">
                        <button onClick={() => setView('record')} className={`px-6 py-2 rounded-full text-sm font-medium transition-all ${view === 'record' ? 'bg-brand-sage text-white' : 'text-gray-400 hover:text-brand-sage'}`}>紀錄</button>
                        <button onClick={() => setView('history')} className={`px-6 py-2 rounded-full text-sm font-medium transition-all ${view === 'history' ? 'bg-brand-sage text-white' : 'text-gray-400 hover:text-brand-sage'}`}>歷史</button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
