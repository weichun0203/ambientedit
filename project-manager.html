<!-- 使用 100dvh 確保手機版瀏覽器網址列不會遮擋內容 -->
<body class="text-brand-ink font-sans h-[100dvh] overflow-hidden flex flex-col selection:bg-brand-sage selection:text-white">

    <div class="flex h-full w-full overflow-hidden relative backdrop-blur-[2px]">
        
        <!-- 手機版側邊欄遮罩 -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-brand-ink/20 backdrop-blur-sm z-30 hidden md:hidden transition-opacity duration-300" onclick="toggleSidebar()"></div>

        <!-- 側邊欄 (專案列表) - 導入 RWD 抽屜式設計 -->
        <aside id="sidebar" class="absolute md:static inset-y-0 left-0 z-40 w-[280px] md:w-72 bg-white/95 md:bg-white/70 backdrop-blur-xl border-r border-brand-sand flex flex-col shrink-0 shadow-soft transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-6 border-b border-brand-sand flex items-center justify-between gap-3 shrink-0">
                <div class="flex items-center gap-3">

            <div id="workspace-content" class="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar hidden">
                <div class="max-w-6xl mx-auto space-y-6 md:space-y-8 pb-10">
                    
                    <!-- 專案完成度大數字區塊 -->

                                <select id="new-task-phase-select" class="w-full md:w-auto px-4 py-3 border border-brand-sand rounded-xl focus:outline-none focus:ring-1 focus:ring-brand-sage bg-brand-paper focus:bg-white text-brand-ink font-bold md:min-w-[150px] shadow-sm appearance-none">
                                </select>
                                <div class="flex flex-col sm:flex-row gap-3 flex-1">
                                    <input type="text" id="new-task-input" placeholder="輸入新的代辦事項..." class="flex-1 w-full px-4 py-3 border border-brand-sand rounded-xl focus:outline-none focus:ring-1 focus:ring-brand-sage transition-all bg-brand-paper focus:bg-white shadow-sm font-medium">
                                    <button type="submit" class="w-full sm:w-auto px-6 py-3 bg-brand-ink text-white rounded-xl hover:bg-brand-ink/80 transition-colors font-bold flex items-center justify-center gap-2 shadow-sm whitespace-nowrap">

                <span class="font-medium">2026 常溫編集所 Ambient Edit Studio.</span>
                <div class="flex items-center gap-4">
                    <a href="https://line.me/R/ti/p/@890mvlvl" target="_blank" rel="noopener noreferrer" class="hover:text-brand-sage transition-colors flex items-center gap-1.5 font-medium group">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="group-hover:scale-110 transition-transform"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        LINE@
                    </a>
                    <a href="https://www.instagram.com/ambientedit_?igsh=ajJseGdpc3dnaTJw" target="_blank" rel="noopener noreferrer" class="hover:text-brand-sage transition-colors flex items-center gap-1.5 font-medium group">
                        <i data-lucide="instagram" class="w-4 h-4 group-hover:scale-110 transition-transform"></i> Instagram
                    </a>
                </div>
            </footer>
        </main>

    <script>
        // --- 狀態定義與初始化 ---
        const STORAGE_KEY = 'ambient_edit_projects_data';
        const SIDEBAR_TITLE_KEY = 'ambient_edit_sidebar_title';
        
        // 任務狀態顏色配置 (套用常溫品牌色系)
        const STATUS_CONFIG = {
            'todo': { label: '待處理', color: '#a8a29e', icon: 'circle', cardClass: 'bg-white border-brand-sand/60 hover:border-brand-ink/20' },
            'in-progress': { label: '進行中', color: '#d4a59a', icon: 'clock', cardClass: 'bg-[#fcf7f6] border-brand-clay/60 hover:shadow-md' },
            'done': { label: '已完成', color: '#8da399', icon: 'check-circle-2', cardClass: 'bg-[#f4f7f6] border-brand-sage/50 opacity-90' }
        };

        const NOW = Date.now();
        const DAY = 24 * 60 * 60 * 1000;

        // 預設資料
        const INITIAL_PROJECTS = [
            { id: 1, name: '開始你的第一個專案', description: '這是常溫編集所預設的專案範本。你可以點擊右上方編輯圖示修改名稱，或在左側建立新的專案。', phases: [
                { id: 101, name: '前期企劃發想' },
                { id: 102, name: '視覺設計與執行' },
                { id: 103, name: '後續結案追蹤' }
            ]}
        ];

        const INITIAL_TASKS = [
            { id: 1, projectId: 1, phaseId: 101, title: '確認品牌調性與專案目標', status: 'done', createdAt: NOW - 2*DAY, completedAt: NOW - 1*DAY },
            { id: 2, projectId: 1, phaseId: 102, title: '設計品牌視覺草圖與排版', status: 'in-progress', createdAt: NOW - 1*DAY, completedAt: null },
            { id: 3, projectId: 1, phaseId: 103, title: '產出結案數據與成效報告', status: 'todo', createdAt: NOW, completedAt: null },
        ];

        let projects = [];
        let tasks = [];
        let activeProjectId = null;
        let activePhaseId = null;
        let draggedPhaseId = null;
        let dragOverPhaseId = null;
        let isSidebarOpen = false;

        // --- 輔助工具 ---
        const formatDate = (ts) => {
            if (!ts) return '';
            const d = new Date(ts);
            return `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        };

        const getDurationText = (start, end) => {
            if (!start || !end) return '';
            const diffMs = end - start;
            if (diffMs < 0) return '不到 1 小時';
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const diffHours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            
            if (diffDays > 0 && diffHours > 0) return `${diffDays} 天 ${diffHours} 小時`;
            if (diffDays > 0) return `${diffDays} 天`;
            if (diffHours > 0) return `${diffHours} 小時`;
            return '不到 1 小時';
        };

        const saveToLocalStorage = () => {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects, tasks }));
        };

        // 手機版側邊欄開關
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            isSidebarOpen = !isSidebarOpen;
            
            if (isSidebarOpen) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // --- 渲染函式 ---
        function renderSidebar() {
            const list = document.getElementById('project-list');
            list.innerHTML = projects.map(project => `
                <button
                    onclick="setActiveProject(${project.id})"
                    class="w-full flex items-center justify-between px-4 py-3 rounded-xl transition-all duration-300 font-medium ${
                        activeProjectId === project.id 
                            ? 'bg-white text-brand-ink shadow-sm border border-brand-sand relative overflow-hidden' 
                            : 'text-brand-ink/60 hover:bg-white hover:text-brand-ink border border-transparent'
                    }"
                >
                    ${activeProjectId === project.id ? '<div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-sage"></div>' : ''}
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i data-lucide="briefcase" class="w-5 h-5 flex-shrink-0 ${activeProjectId === project.id ? 'text-brand-sage' : 'text-brand-ink/40'}"></i>
                        <span class="truncate text-sm tracking-wide text-left">${project.name}</span>
                    </div>
                    ${activeProjectId === project.id ? '<i data-lucide="chevron-right" class="w-4 h-4 text-brand-sage shrink-0"></i>' : ''}
                </button>
            `).join('');
            lucide.createIcons();
        }

        function renderMainArea() {
            const workspace = document.getElementById('workspace-content');
            const project = projects.find(p => p.id === activeProjectId);

            if (!project) {
                workspace.classList.add('hidden');
                document.getElementById('project-title-display').textContent = '選擇或建立一個專案';
                document.getElementById('project-desc-display').textContent = '';
                document.getElementById('edit-project-btn').classList.add('hidden');
                document.getElementById('project-progress-text').textContent = '0%';
                document.getElementById('project-progress-circle').setAttribute('stroke-dasharray', '0, 100');
                document.title = "常溫專案進度管理｜Ambient Project Tracker";
                return;
            }
            
            // SEO: 動態更新網頁 Title
            document.title = `常溫${project.name}｜Ambient Project Tracker`;

            workspace.classList.remove('hidden');
            
            // 標題與描述
            document.getElementById('project-title-display').textContent = project.name;
            document.getElementById('project-desc-display').textContent = project.description || '';
            document.getElementById('edit-project-btn').classList.remove('hidden');

            // 總進度
            const projectTasks = tasks.filter(t => t.projectId === project.id);
            const total = projectTasks.length;
            const done = projectTasks.filter(t => t.status === 'done').length;
            const progress = total === 0 ? 0 : Math.round((done / total) * 100);
            
            document.getElementById('project-progress-text').textContent = `${progress}%`;
            document.getElementById('project-progress-circle').setAttribute('stroke-dasharray', `${progress}, 100`);

            // 更新任務表單的階段選單
            const phaseSelect = document.getElementById('new-task-phase-select');
            phaseSelect.innerHTML = (project.phases || []).map(p => 
                `<option value="${p.id}" ${p.id === activePhaseId ? 'selected' : ''}>${p.name}</option>`
            ).join('');

            renderPhases(project);
            renderTasks(project);
        }

        function renderPhases(project) {
            const container = document.getElementById('phases-container');
            const projectTasks = tasks.filter(t => t.projectId === project.id);
            
            const phaseStats = (project.phases || []).map(phase => {
                const pTasks = projectTasks.filter(t => t.phaseId === phase.id);
                const total = pTasks.length;
                const done = pTasks.filter(t => t.status === 'done').length;
                const progress = total === 0 ? 0 : Math.round((done / total) * 100);
                return { ...phase, total, done, progress };
            });

            const allTasksBtn = `
                <button
                    onclick="setActivePhase(null)"
                    class="flex-shrink-0 px-4 md:px-5 py-2 md:py-3 rounded-xl border-2 transition-all h-20 shadow-sm ${
                        activePhaseId === null 
                            ? 'border-brand-sage bg-white text-brand-sage' 
                            : 'border-brand-sand bg-brand-paper text-brand-ink/60 hover:border-brand-sage/40 hover:bg-white'
                    }"
                >
                    <div class="font-bold mb-1 text-sm md:text-base">全部任務</div>
                    <div class="text-[10px] md:text-xs opacity-80 font-medium">專案總覽</div>
                </button>
            `;

            const phasesHtml = phaseStats.map(phase => `
                <div class="flex-shrink-0 text-brand-sand flex items-center hidden sm:flex">
                    <i data-lucide="chevron-right" class="w-5 h-5 md:w-6 md:h-6"></i>
                </div>
                <div
                    draggable="true"
                    ondragstart="handlePhaseDragStart(event, ${phase.id})"
                    ondragover="handlePhaseDragOver(event)"
                    ondragenter="handlePhaseDragEnter(event, ${phase.id})"
                    ondragleave="handlePhaseDragLeave(event)"
                    ondrop="handlePhaseDrop(event, ${phase.id})"
                    ondragend="handlePhaseDragEnd()"
                    onclick="setActivePhase(${phase.id})"
                    class="flex-shrink-0 min-w-[160px] md:min-w-[200px] p-3 md:p-4 rounded-xl border-2 transition-all text-left relative overflow-hidden h-20 flex flex-col justify-between cursor-pointer group shadow-sm ${
                        draggedPhaseId === phase.id ? 'opacity-40 scale-95 border-dashed' : ''
                    } ${
                        dragOverPhaseId === phase.id ? 'border-brand-sage bg-brand-sage/10 shadow-lg scale-105' : 
                        activePhaseId === phase.id ? 'border-brand-sage bg-white shadow-md' : 'border-brand-sand bg-brand-paper hover:border-brand-sage/50 hover:bg-white'
                    }"
                >
                    <div class="flex justify-between items-center relative z-10 gap-2">
                        <span class="font-bold truncate text-sm md:text-base tracking-wide ${activePhaseId === phase.id ? 'text-brand-sage' : 'text-brand-ink'}">
                            ${phase.name}
                        </span>
                        <div class="absolute right-0 top-0 text-brand-sand opacity-0 md:group-hover:opacity-100 transition-opacity cursor-grab active:cursor-grabbing hidden md:block">
                            <i data-lucide="grip-horizontal" class="w-4 h-4"></i>
                        </div>
                        <span class="text-[10px] md:text-xs font-bold px-1.5 md:px-2 py-0.5 rounded-md bg-white border border-brand-sand text-brand-ink/60 flex-shrink-0">
                            ${phase.done}/${phase.total}
                        </span>
                    </div>
                    <div class="w-full bg-brand-sand h-1 md:h-1.5 rounded-full overflow-hidden relative z-10 mt-2 pointer-events-none">
                        <div 
                            class="h-full rounded-full transition-all duration-500 ${phase.progress === 100 ? 'bg-brand-sage' : 'bg-brand-clay'}"
                            style="width: ${phase.progress}%"
                        ></div>
                    </div>
                    ${activePhaseId === phase.id ? `
                        <div class="absolute -right-2 -bottom-2 opacity-5 pointer-events-none">
                            <i data-lucide="git-commit" class="w-12 h-12 md:w-16 md:h-16"></i>
                        </div>
                    ` : ''}
                </div>
            `).join('');

            container.innerHTML = allTasksBtn + phasesHtml;
            lucide.createIcons();
        }

        function renderTasks(project) {
            const container = document.getElementById('tasks-container');
            let displayTasks = tasks.filter(t => t.projectId === project.id);
            
            if (activePhaseId) {
                displayTasks = displayTasks.filter(t => t.phaseId === activePhaseId);
                const phaseName = project.phases.find(p => p.id === activePhaseId)?.name;
                document.getElementById('task-list-title').textContent = `任務清單：${phaseName}`;
                document.getElementById('task-count').textContent = `共 ${displayTasks.length} 項`;
            } else {
                document.getElementById('task-list-title').textContent = '全部任務';
                document.getElementById('task-count').textContent = `共 ${displayTasks.length} 項`;
            }

            if (displayTasks.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-10 md:py-12 text-brand-ink/40 border-2 border-dashed border-brand-sand rounded-xl bg-white/50 backdrop-blur-sm mx-2 md:mx-0">
                        <i data-lucide="list-todo" class="w-10 h-10 md:w-12 md:h-12 mx-auto text-brand-sand mb-3"></i>
                        <p class="text-xs md:text-sm font-medium tracking-wide">此階段還沒有任務，開始規劃吧！</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            container.innerHTML = displayTasks.sort((a,b) => b.createdAt - a.createdAt).map(task => {
                const phaseName = project.phases.find(p => p.id === task.phaseId)?.name || '未分類';
                const isDone = task.status === 'done';
                const durationText = (isDone && task.completedAt) 
                    ? getDurationText(task.createdAt, task.completedAt) 
                    : getDurationText(task.createdAt, Date.now());

                const statusButtonsHtml = Object.entries(STATUS_CONFIG).map(([key, config]) => {
                    const isActive = task.status === key;
                    return `
                        <button
                            onclick="updateTaskStatus(${task.id}, '${key}')"
                            class="p-1.5 md:p-2 rounded-md transition-all ${isActive ? 'bg-white shadow-sm' : 'hover:bg-brand-sand/50 text-brand-ink/40'}"
                            title="設為${config.label}"
                        >
                            <i data-lucide="${config.icon}" class="w-4 h-4" style="color: ${isActive ? config.color : 'currentColor'}"></i>
                        </button>
                    `;
                }).join('');

                return `
                <div class="group flex flex-col md:flex-row md:items-center justify-between p-4 rounded-xl border transition-all shadow-sm gap-4 md:gap-6 ${STATUS_CONFIG[task.status].cardClass}">
                    <div class="flex flex-col sm:flex-row sm:items-start md:items-center gap-4 flex-1 min-w-0">
                        <!-- 狀態切換按鈕群組 -->
                        <div class="flex bg-white/60 backdrop-blur-sm rounded-lg p-1 border border-brand-sand shrink-0 w-max">
                            ${statusButtonsHtml}
                        </div>
                        
                        <div class="flex flex-col gap-1.5 min-w-0">
                            <div class="flex flex-wrap items-center gap-2">
                                <span class="text-sm md:text-base font-bold tracking-wide transition-all truncate max-w-full ${isDone ? 'text-brand-ink/40 line-through' : 'text-brand-ink'}">
                                    ${task.title}
                                </span>
                                ${!activePhaseId ? `<span class="inline-flex items-center px-2 py-0.5 border border-brand-sand rounded text-[10px] md:text-xs text-brand-ink/60 bg-white font-medium shadow-sm whitespace-nowrap">${phaseName}</span>` : ''}
                            </div>
                            
                            <div class="flex flex-wrap items-center gap-1.5 md:gap-2 text-[10px] md:text-xs font-medium text-brand-ink/50">
                                <span class="flex items-center gap-1 whitespace-nowrap">
                                    <i data-lucide="calendar" class="w-3 h-3"></i>
                                    建立於 ${formatDate(task.createdAt)}
                                </span>
                                ${isDone && task.completedAt ? `
                                    <span class="text-brand-sand hidden sm:inline">•</span>
                                    <span class="flex items-center gap-1 text-brand-sage/90 whitespace-nowrap">
                                        <i data-lucide="check-circle-2" class="w-3 h-3"></i>
                                        完成於 ${formatDate(task.completedAt)}
                                    </span>
                                    <span class="text-brand-sand hidden sm:inline">•</span>
                                    <span class="text-brand-ink/70 bg-white border border-brand-sand px-1.5 py-0.5 rounded shadow-sm whitespace-nowrap">
                                        歷時 ${durationText}
                                    </span>
                                ` : `
                                    <span class="text-brand-sand hidden sm:inline">•</span>
                                    <span class="whitespace-nowrap">已進行 ${durationText}</span>
                                `}
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center justify-between sm:justify-end gap-4 shrink-0 w-full md:w-auto border-t md:border-t-0 border-brand-sand/50 pt-3 md:pt-0">
                        <span class="px-3 py-1 rounded-full text-[10px] md:text-xs font-bold tracking-widest" style="background-color: ${STATUS_CONFIG[task.status].color}15; color: ${STATUS_CONFIG[task.status].color}; border: 1px solid ${STATUS_CONFIG[task.status].color}30;">
                            ${STATUS_CONFIG[task.status].label}
                        </span>
                        <button onclick="confirmDeleteTask(${task.id})" class="text-brand-sand hover:text-red-500 md:opacity-0 group-hover:opacity-100 transition-all p-2 rounded-lg hover:bg-red-50" title="刪除任務">
                            <i data-lucide="trash-2" class="w-4 h-4 md:w-5 md:h-5"></i>
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            lucide.createIcons();
        }

        // --- 互動邏輯 ---
        function setActiveProject(id) {
            activeProjectId = id;
            activePhaseId = null;
            
            // 手機版點擊專案後自動收合側邊欄
            if (window.innerWidth < 768 && isSidebarOpen) {
                toggleSidebar();
            }
            
            renderSidebar();
            renderMainArea();
        }

        function setActivePhase(id) {
            activePhaseId = id;
            renderMainArea();
        }

        function updateTaskStatus(taskId, newStatus) {
            tasks = tasks.map(task => {
                if (task.id === taskId) {
                    const isNowDone = newStatus === 'done';
                    const wasDone = task.status === 'done';
                    let newCompletedAt = task.completedAt;
                    
                    if (isNowDone && !wasDone) newCompletedAt = Date.now();
                    if (!isNowDone) newCompletedAt = null;

                    return { ...task, status: newStatus, completedAt: newCompletedAt };
                }
                return task;
            });
            saveToLocalStorage();
            renderMainArea();
        }

        function confirmDeleteTask(taskId) {
            if(confirm('確定要刪除這項任務嗎？刪除後無法復原。')) {
                tasks = tasks.filter(task => task.id !== taskId);
                saveToLocalStorage();
                renderMainArea();
            }
        }

        function handlePhaseDragStart(e, phaseId) {
            draggedPhaseId = phaseId;
            e.dataTransfer.effectAllowed = 'move';
        }
        function handlePhaseDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }
        function handlePhaseDragEnter(e, phaseId) {
            e.preventDefault();
            if (phaseId !== draggedPhaseId) {
                dragOverPhaseId = phaseId;
                renderMainArea();
            }
        }
        function handlePhaseDragLeave(e) {
            e.preventDefault();
        }
        function handlePhaseDrop(e, targetPhaseId) {
            e.preventDefault();
            if (!draggedPhaseId || draggedPhaseId === targetPhaseId) {
                handlePhaseDragEnd();
                return;
            }

            projects = projects.map(p => {
                if (p.id === activeProjectId) {
                    const newPhases = [...p.phases];
                    const draggedIndex = newPhases.findIndex(ph => ph.id === draggedPhaseId);
                    const targetIndex = newPhases.findIndex(ph => ph.id === targetPhaseId);
                    const [draggedItem] = newPhases.splice(draggedIndex, 1);
                    newPhases.splice(targetIndex, 0, draggedItem);
                    return { ...p, phases: newPhases };
                }
                return p;
            });

            saveToLocalStorage();
            handlePhaseDragEnd();
        }
        function handlePhaseDragEnd() {
            draggedPhaseId = null;
            dragOverPhaseId = null;
            renderMainArea();
        }

        // --- 初始化與事件綁定 ---
        function setupEventListeners() {
            // 側邊欄標題本地儲存
            const sidebarTitleEl = document.getElementById('sidebar-title');
            const savedSidebarTitle = localStorage.getItem(SIDEBAR_TITLE_KEY);
            if (savedSidebarTitle) {
                sidebarTitleEl.textContent = savedSidebarTitle;
            }
            sidebarTitleEl.addEventListener('blur', (e) => {
                localStorage.setItem(SIDEBAR_TITLE_KEY, e.target.textContent);
            });
            sidebarTitleEl.addEventListener('keydown', (e) => {
                if(e.key === 'Enter') {
                    e.preventDefault();
                    sidebarTitleEl.blur();
                }
            });

            // 新增專案
            document.getElementById('add-project-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('new-project-input');
                const name = input.value.trim();
                if (!name) return;
                
                const newProject = {
                    id: Date.now(),
                    name: name,
                    description: '這是一個新建立的品牌專案，點擊右上角編輯圖示以修改詳細資訊。',
                    phases: [
                        { id: Date.now() + 1, name: '前期企劃' },
                        { id: Date.now() + 2, name: '設計執行' }
                    ]
                };
                projects.push(newProject);
                activeProjectId = newProject.id;
                saveToLocalStorage();
                input.value = '';
                
                if (window.innerWidth < 768 && isSidebarOpen) {
                    toggleSidebar();
                }
                
                renderSidebar();
                renderMainArea();
            });

            // 編輯專案資訊
            const editBtn = document.getElementById('edit-project-btn');
            const headerDisplay = document.getElementById('project-header-display');
            const descDisplay = document.getElementById('project-desc-display');
            const editForm = document.getElementById('project-edit-form');
            const titleInput = document.getElementById('edit-title-input');
            const descInput = document.getElementById('edit-desc-input');

            editBtn.addEventListener('click', () => {
                const project = projects.find(p => p.id === activeProjectId);
                titleInput.value = project.name;
                descInput.value = project.description || '';
                headerDisplay.classList.add('hidden');
                descDisplay.classList.add('hidden');
                editForm.classList.remove('hidden');
            });

            document.getElementById('cancel-edit-btn').addEventListener('click', () => {
                headerDisplay.classList.remove('hidden');
                descDisplay.classList.remove('hidden');
                editForm.classList.add('hidden');
            });

            document.getElementById('save-project-btn').addEventListener('click', () => {
                const newName = titleInput.value.trim();
                if (!newName) return;
                
                projects = projects.map(p => 
                    p.id === activeProjectId 
                        ? { ...p, name: newName, description: descInput.value.trim() } 
                        : p
                );
                saveToLocalStorage();
                
                headerDisplay.classList.remove('hidden');
                descDisplay.classList.remove('hidden');
                editForm.classList.add('hidden');
                renderSidebar();
                renderMainArea();
            });

            // 新增階段
            document.getElementById('add-phase-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('new-phase-input');
                const name = input.value.trim();
                if (!name || !activeProjectId) return;

                projects = projects.map(p => {
                    if (p.id === activeProjectId) {
                        return { ...p, phases: [...(p.phases || []), { id: Date.now(), name: name }] };
                    }
                    return p;
                });
                saveToLocalStorage();
                input.value = '';
                renderMainArea();
                
                // 新增後滾動到底部
                setTimeout(() => {
                    const container = document.getElementById('phases-container');
                    container.scrollLeft = container.scrollWidth;
                }, 50);
            });

            // 新增任務
            document.getElementById('add-task-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('new-task-input');
                const phaseSelect = document.getElementById('new-task-phase-select');
                const title = input.value.trim();
                const phaseId = Number(phaseSelect.value);
                
                if (!title || !activeProjectId || !phaseId) return;

                const newTask = {
                    id: Date.now(),
                    projectId: activeProjectId,
                    phaseId: phaseId,
                    title: title,
                    status: 'todo',
                    createdAt: Date.now(),
                    completedAt: null
                };
                
                tasks.push(newTask);
                saveToLocalStorage();
                input.value = '';
                renderMainArea();
            });
        }

        function init() {
            const savedData = localStorage.getItem(STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    projects = parsed.projects || INITIAL_PROJECTS;
                    tasks = parsed.tasks || INITIAL_TASKS;
                } catch (e) {
                    projects = INITIAL_PROJECTS;
                    tasks = INITIAL_TASKS;
                }
            } else {
                projects = INITIAL_PROJECTS;
                tasks = INITIAL_TASKS;
            }

            if (projects.length > 0) {
                activeProjectId = projects[0].id;
            }

            setupEventListeners();
            renderSidebar();
            renderMainArea();
            lucide.createIcons();
        }

        // 啟動系統
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
