    <!-- Application Logic -->
    <script>
        // 設定資料
        const colors = [
            '紅 Red', '紫 Purple', '粉 Pink', 
            '黃 Yellow', '淺藍 Light Blue', '深藍 Navy Blue', 
            '灰 Grey', '白 White', '黑 Black'
        ];
        
        const TIE_PRICE = 350;
        const SCROLL_PRICE = 650;
        const SHIPPING_PRICE = 38;

        // 狀態管理 (預設值)
        let state = {
            ties: {},
            scrolls: 0,
            delivery: '711',
            location: ''
        };

        colors.forEach(c => state.ties[c] = 0);

        // 初始化 Local Storage 存取
        const STORAGE_KEY = 'ambient_order_state';
        
        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    // 確保讀取的資料結構正確
                    state.scrolls = parsed.scrolls || 0;
                    state.delivery = parsed.delivery || '711';
                    state.location = parsed.location || '';
                    if (parsed.ties) {
                        colors.forEach(c => {
                            state.ties[c] = parsed.ties[c] || 0;
                        });
                    }
                }
            } catch (e) {
                console.error("Local storage load error", e);
            }
        }

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch (e) {
                console.error("Local storage save error", e);
            }
        }

        // DOM 元素生成與綁定
        function renderTies() {
            const container = document.getElementById('ties-container');
            container.innerHTML = '';
            
            colors.forEach(color => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-3 bg-brand-paper/50 border border-brand-sand rounded-xl hover:border-brand-sage transition-colors';
                
                div.innerHTML = `
                    <span class="font-medium text-brand-ink text-sm flex-1 pr-2">${color}</span>
                    <div class="flex items-center gap-2">
                        <button onclick="updateTie('${color}', -1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-white border border-brand-sand text-brand-ink hover:bg-brand-sand transition-colors">-</button>
                        <input type="number" min="0" value="${state.ties[color]}" onchange="handleTieInput('${color}', this.value)" class="w-10 text-center p-0 border-none bg-transparent font-semibold text-brand-ink focus:ring-0 focus:outline-none text-sm">
                        <button onclick="updateTie('${color}', 1)" class="w-8 h-8 flex items-center justify-center rounded-full bg-brand-sage text-white shadow-sm hover:bg-brand-sage/80 transition-colors">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 更新邏輯
        function updateTie(color, delta) {
            let newVal = state.ties[color] + delta;
            if (newVal < 0) newVal = 0;
            state.ties[color] = newVal;
            saveState();
            updateUI();
        }

        function handleTieInput(color, val) {
            let newVal = parseInt(val) || 0;
            if (newVal < 0) newVal = 0;
            state.ties[color] = newVal;
            saveState();
            updateUI();
        }

        function updateScroll(delta) {
            let newVal = state.scrolls + delta;
            if (newVal < 0) newVal = 0;
            state.scrolls = newVal;
            saveState();
            updateUI();
        }

        function handleScrollInput(val) {
            let newVal = parseInt(val) || 0;
            if (newVal < 0) newVal = 0;
            state.scrolls = newVal;
            saveState();
            updateUI();
        }

        function setMeetupLocation(loc) {
            state.location = loc;
            document.getElementById('meetup-location').value = loc;
            saveState();
            updateUI();
        }

        // 綁定運送方式事件
        document.querySelectorAll('input[name="delivery"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.delivery = e.target.value;
                saveState();
                updateUI();
            });
        });

        document.getElementById('meetup-location').addEventListener('input', (e) => {
            state.location = e.target.value;
            saveState();
            updateUI();
        });

        // UI 更新與計算
        let currentOrderText = '';

        function updateUI() {
            // 1. 更新輸入框數值
            renderTies(); // 重新渲染領帶區確保數值正確
            document.getElementById('scroll-input').value = state.scrolls;
            document.getElementById('meetup-location').value = state.location;

            // 2. 更新運送方式 UI
            document.querySelectorAll('input[name="delivery"]').forEach(radio => {
                const label = radio.closest('label');
                if (radio.value === state.delivery) {
                    radio.checked = true;
                    label.classList.add('bg-brand-paper', 'border-brand-sage/30');
                    label.classList.remove('border-transparent');
                } else {
                    label.classList.remove('bg-brand-paper', 'border-brand-sage/30');
                    label.classList.add('border-transparent');
                }
            });

            const inPersonDetails = document.getElementById('in-person-details');
            if (state.delivery === 'in-person') {
                inPersonDetails.classList.remove('hidden');
                setTimeout(() => inPersonDetails.style.opacity = '1', 10);
            } else {
                inPersonDetails.classList.add('hidden');
                inPersonDetails.style.opacity = '0';
            }

            // 3. 計算總價與生成文字
            let tiesCount = 0;
            const activeTies = [];
            
            colors.forEach(c => {
                if (state.ties[c] > 0) {
                    tiesCount += state.ties[c];
                    activeTies.push(`${c}*${state.ties[c]}`);
                }
            });

            const shippingCost = state.delivery === '711' ? SHIPPING_PRICE : 0;
            const total = (tiesCount * TIE_PRICE) + (state.scrolls * SCROLL_PRICE) + shippingCost;
            
            document.getElementById('total-price').innerText = `$${total}`;

            const parts = [];
            
            if (activeTies.length > 0) {
                parts.push(`【領帶 Ties】${activeTies.join(', ')}`);
            }
            
            if (state.scrolls > 0) {
                parts.push(`【卷軸 Scrolls】${state.scrolls}個`);
            }
            
            if (state.delivery === '711') {
                parts.push(`【運送 Delivery】7-11 (+${SHIPPING_PRICE})`);
            } else {
                parts.push(`【運送 Delivery】面交 In-person`);
                if (state.location.trim()) {
                    parts.push(`【地點 Location】${state.location.trim()}`);
                }
            }
            
            parts.push(`------------------`);
            parts.push(`【總計 Total】$${total}`);

            const previewEl = document.getElementById('order-preview');
            const copyBtn = document.getElementById('copy-btn');

            if (activeTies.length === 0 && state.scrolls === 0) {
                currentOrderText = '尚未選擇商品';
                previewEl.innerText = currentOrderText;
                previewEl.classList.add('text-brand-ink/50');
                
                // 停用按鈕
                copyBtn.disabled = true;
                copyBtn.className = "w-full py-4 px-4 rounded-xl flex items-center justify-center gap-2 font-bold tracking-widest transition-all duration-300 bg-brand-sand/50 text-brand-ink/40 cursor-not-allowed";
            } else {
                currentOrderText = parts.join('\n');
                previewEl.innerText = currentOrderText;
                previewEl.classList.remove('text-brand-ink/50');
                
                // 啟用按鈕
                copyBtn.disabled = false;
                copyBtn.className = "w-full py-4 px-4 rounded-xl flex items-center justify-center gap-2 font-bold tracking-widest transition-all duration-300 bg-brand-sage text-white hover:bg-brand-ink hover:shadow-soft active:scale-[0.98] cursor-pointer";
            }
        }

        // 複製功能
        function copyToClipboard() {
            if (currentOrderText === '尚未選擇商品') return;

            const textArea = document.createElement("textarea");
            textArea.value = currentOrderText;
            document.body.appendChild(textArea);
            textArea.select();
            
            try {
                document.execCommand('copy');
                
                // UI 回饋
                const copyBtn = document.getElementById('copy-btn');
                const copyText = document.getElementById('copy-text');
                const copyIcon = document.getElementById('copy-icon');
                
                copyBtn.className = "w-full py-4 px-4 rounded-xl flex items-center justify-center gap-2 font-bold tracking-widest transition-all duration-300 bg-brand-clay text-white shadow-soft";
                copyText.innerText = "已複製到剪貼簿！";
                copyIcon.innerHTML = `<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>`;

                setTimeout(() => {
                    updateUI(); // 恢復按鈕原本狀態
                    copyText.innerText = "一鍵複製訂單";
                    copyIcon.innerHTML = `<rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>`;
                }, 2000);

            } catch (err) {
                console.error('複製失敗', err);
                // 替代 Alert 的做法，使用 UI 顯示錯誤
                const copyText = document.getElementById('copy-text');
                copyText.innerText = "複製失敗，請手動選取上方文字";
                setTimeout(() => {
                    copyText.innerText = "一鍵複製訂單";
                }, 3000);
            } finally {
                document.body.removeChild(textArea);
            }
        }

        // 頁面載入時初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadState();
            updateUI();
        });

    </script>
</body>
</html>
