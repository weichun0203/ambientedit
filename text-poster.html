    <script>
        // 常數設定 (A4 比例，設定為 150 DPI 的像素尺寸)
        const A4_WIDTH = 1240;
        const A4_HEIGHT = 1754;
        // 預設字體：優先使用 Noto Serif TC，若無則降級
        const FONT_FAMILY = "'Noto Serif TC', 'Noto Sans TC', serif";
        const LINE_HEIGHT_MULTIPLIER = 1.6; // 增加行距，提升閱讀質感

        // 取得 DOM 元素
        const canvas = document.getElementById('renderCanvas');
        const ctx = canvas.getContext('2d');
        const textInput = document.getElementById('textInput');
        const bgColorPicker = document.getElementById('bgColor');
        const textColorPicker = document.getElementById('textColor');
        const paddingSlider = document.getElementById('paddingSlider');
        const paddingValueLabel = document.getElementById('paddingValue');
        const alignBtns = document.querySelectorAll('.align-btn');
        const vCenterToggle = document.getElementById('vCenterToggle');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusBadge = document.getElementById('statusBadge');
        const toastMessage = document.getElementById('toastMessage');
        const toastText = document.getElementById('toastText');

        // 系統狀態 (預設值)
        let state = {
            text: "常溫，是一種剛剛好的狀態。\n\n在這裡，我們將文字與設計結合，為品牌注入溫度。這是一個測試用的排版工具，幫助你快速將文字轉化為具有質感的 A4 圖片。\n\n請在左側面板開始編輯。",
            bgColor: "#fdfbf7",
            textColor: "#4a4a4a",
            paddingPercent: 12,
            align: "left",
            vCenter: true
        };

        // 嘗試從 LocalStorage 讀取紀錄
        function loadStateFromStorage() {
            try {
                const savedState = localStorage.getItem('ambientA4GeneratorState');
                if (savedState) {
                    const parsedState = JSON.parse(savedState);
                    // 合併預設值與存檔，避免欄位遺失
                    state = { ...state, ...parsedState }; 
                }
            } catch (e) {
                console.warn("讀取本地紀錄失敗", e);
            }
        }

        // 儲存狀態到 LocalStorage
        function saveStateToStorage() {
            try {
                localStorage.setItem('ambientA4GeneratorState', JSON.stringify(state));
            } catch (e) {
                console.warn("寫入本地紀錄失敗", e);
            }
        }

        // 初始化畫布尺寸
        canvas.width = A4_WIDTH;
        canvas.height = A4_HEIGHT;

        // 自訂提示訊息函數 (取代 alert)
        function showToast(message, duration = 3000) {
            toastText.textContent = message;
            toastMessage.classList.remove('opacity-0', 'translate-y-4');
            toastMessage.classList.add('opacity-100', 'translate-y-0');
            
            setTimeout(() => {
                toastMessage.classList.remove('opacity-100', 'translate-y-0');
                toastMessage.classList.add('opacity-0', '-translate-y-4'); // 往上淡出
            }, duration);
        }

        // 初始化 UI 數值
        function syncUIWithState() {
            textInput.value = state.text;
            bgColorPicker.value = state.bgColor;
            textColorPicker.value = state.textColor;
            paddingSlider.value = state.paddingPercent;
            paddingValueLabel.textContent = `${state.paddingPercent}%`;
            vCenterToggle.checked = state.vCenter;
            updateAlignButtonsUI();
        }

        // 防抖函數 (Debounce)
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                    statusBadge.classList.remove('opacity-100');
                    statusBadge.classList.add('opacity-0');
                };
                if (!timeout) {
                    statusBadge.classList.remove('opacity-0');
                    statusBadge.classList.add('opacity-100');
                }
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // 畫布文字換行計算
        function getWrappedLines(ctx, text, maxWidth) {
            if (!text) return [];
            const paragraphs = text.split('\n');
            const lines = [];

            paragraphs.forEach(paragraph => {
                if (paragraph.trim() === '') {
                    lines.push(''); 
                    return;
                }
                let currentLine = '';
                for (let i = 0; i < paragraph.length; i++) {
                    const char = paragraph[i];
                    const testLine = currentLine + char;
                    const metrics = ctx.measureText(testLine);
                    const testWidth = metrics.width;

                    if (testWidth > maxWidth && i > 0) {
                        lines.push(currentLine);
                        currentLine = char;
                    } else {
                        currentLine = testLine;
                    }
                }
                lines.push(currentLine);
            });
            return lines;
        }

        // 自動計算最佳字體大小的核心演算法
        function calculateOptimalFontSize(ctx, text, availableWidth, availableHeight) {
            let minSize = 12;
            let maxSize = 600;
            let optimalSize = minSize;
            let bestLines = [];

            while (minSize <= maxSize) {
                let midSize = Math.floor((minSize + maxSize) / 2);
                ctx.font = `500 ${midSize}px ${FONT_FAMILY}`; // 使用 500 字重
                
                const charWidthExceeded = text.split('').some(char => ctx.measureText(char).width > availableWidth);
                if(charWidthExceeded) {
                    maxSize = midSize - 1;
                    continue;
                }

                const lines = getWrappedLines(ctx, text, availableWidth);
                const totalTextHeight = lines.length * (midSize * LINE_HEIGHT_MULTIPLIER);

                if (totalTextHeight <= availableHeight) {
                    optimalSize = midSize;
                    bestLines = lines;
                    minSize = midSize + 1; 
                } else {
                    maxSize = midSize - 1; 
                }
            }

            ctx.font = `500 ${optimalSize}px ${FONT_FAMILY}`;
            bestLines = getWrappedLines(ctx, text, availableWidth);
            
            return {
                fontSize: optimalSize,
                lines: bestLines,
                totalHeight: bestLines.length * (optimalSize * LINE_HEIGHT_MULTIPLIER)
            };
        }

        // 核心繪圖函數
        function render() {
            // 清空畫布與繪製背景
            ctx.fillStyle = state.bgColor;
            ctx.fillRect(0, 0, A4_WIDTH, A4_HEIGHT);

            if (!state.text.trim()) return;

            // 計算可用範圍
            const paddingPx = A4_WIDTH * (state.paddingPercent / 100);
            const availableW = A4_WIDTH - (paddingPx * 2);
            const availableH = A4_HEIGHT - (paddingPx * 2);

            // 計算最佳字體與換行
            const { fontSize, lines, totalHeight } = calculateOptimalFontSize(ctx, state.text, availableW, availableH);

            // 設定繪製樣式
            ctx.fillStyle = state.textColor;
            ctx.textBaseline = 'top';

            // 計算起始座標
            let startY = paddingPx;
            if (state.vCenter) {
                startY = paddingPx + (availableH - totalHeight) / 2;
            }

            let startX = paddingPx;
            if (state.align === 'center') {
                ctx.textAlign = 'center';
                startX = A4_WIDTH / 2;
            } else if (state.align === 'right') {
                ctx.textAlign = 'right';
                startX = A4_WIDTH - paddingPx;
            } else {
                ctx.textAlign = 'left';
                startX = paddingPx;
            }

            // 逐行繪製文字
            const lineHeight = fontSize * LINE_HEIGHT_MULTIPLIER;
            lines.forEach((line, index) => {
                const y = startY + (index * lineHeight);
                ctx.fillText(line, startX, y);
            });
            
            // 每次渲染完畢後儲存狀態
            saveStateToStorage();
        }

        // 更新對齊按鈕的 UI 狀態
        function updateAlignButtonsUI() {
            alignBtns.forEach(btn => {
                if (btn.dataset.align === state.align) {
                    btn.classList.add('bg-white', 'shadow-sm', 'text-brand-ink');
                    btn.classList.remove('text-brand-ink/60');
                } else {
                    btn.classList.remove('bg-white', 'shadow-sm', 'text-brand-ink');
                    btn.classList.add('text-brand-ink/60');
                }
            });
        }

        // 防抖包裝的渲染函數
        const debouncedRender = debounce(() => {
            state.text = textInput.value;
            render();
        }, 300);

        // 綁定事件監聽器
        textInput.addEventListener('input', debouncedRender);

        bgColorPicker.addEventListener('input', (e) => {
            state.bgColor = e.target.value;
            render();
        });

        textColorPicker.addEventListener('input', (e) => {
            state.textColor = e.target.value;
            render();
        });

        paddingSlider.addEventListener('input', (e) => {
            state.paddingPercent = parseInt(e.target.value);
            paddingValueLabel.textContent = `${state.paddingPercent}%`;
            render();
        });

        alignBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                state.align = e.target.dataset.align;
                updateAlignButtonsUI();
                render();
            });
        });

        vCenterToggle.addEventListener('change', (e) => {
            state.vCenter = e.target.checked;
            render();
        });

        // 匯出圖片功能
        downloadBtn.addEventListener('click', () => {
            state.text = textInput.value;
            render();

            try {
                const dataUrl = canvas.toDataURL('image/png', 1.0);
                const link = document.createElement('a');
                const dateString = new Date().toISOString().slice(0,10).replace(/-/g,"");
                link.download = `Ambient_A4_${dateString}.png`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showToast("圖片已成功匯出");
            } catch (err) {
                console.error("匯出失敗:", err);
                showToast("圖片匯出失敗，請檢查瀏覽器權限。");
            }
        });

        // 系統初始化流程
        loadStateFromStorage(); // 1. 讀取本地紀錄
        syncUIWithState();      // 2. 將紀錄同步至介面
        render();               // 3. 初次渲染畫布

        // 確保字型載入後重新渲染，避免字型寬度計算誤差
        document.fonts.ready.then(() => {
            render();
        });

    </script>
</body>
</html>
